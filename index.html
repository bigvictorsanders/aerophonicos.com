<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerophonicos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: url('flyer.png') no-repeat center center;
      background-size: cover;
      height: 100vh;
    }

    .overlay {
      background: rgba(0,0,0,0.7);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
      line-height: 1.2em;
    }

    .subtitle {
      font-size: 1.2em;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .desc {
      max-width: 700px;
      font-size: 0.95em;
      opacity: 0.9;
      margin-bottom: 25px;
      line-height: 1.4em;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: #e63946;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4d5a;
    }

    .btn-secondary {
      background: #222;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.8em;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="overlay">

    <h1>
      Conejo Jolivet (Pappo's Blues)<br>
      & Aerophonicos en Vivo
    </h1>

    <div class="subtitle">
      VIERNES 24 de abril, 2026<br>
      BAR QUE SEA ROCK (Rosario, Santa Fe)
    </div>

    <div class="desc">
      Después de la función especial en Cine El Cairo,<br>
      <em>"Algo ha cambiado: Un viaje quijotesco al Pappo´s Blues"</em>
    </div>

    <!-- BOTÓN ENTRADAS -->
    <a class="btn" href="https://www.masentrada.app/events/conejo-jolivet-aerophonicos-rosario" target="_blank">
      🎟 Comprar entradas
    </a>

    <!-- INSTAGRAM -->
    <a class="btn btn-secondary" href="https://instagram.com/aerophonicos" target="_blank">
      📸 @aerophonicos
    </a>

    <div class="footer">
      Rosario – 24 de Abril
    </div>

  </div>

</body>
</html>
